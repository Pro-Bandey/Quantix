                    <option value="milliseconds">Milliseconds (ms)</option>
                    <option value="seconds">Seconds (s)</option>
                    <option value="minutes">Minutes (min)</option>
                    <option value="hours" selected>Hours (hr)</option>
                    <option value="days">Days</option>
                    <option value="weeks">Weeks</option>
                    <option value="months">Months</option>
                    <option value="years">Years</option>
                    <option value="century">Century</option>
                </select>
            </div>
            <div class="swap-button-container">
                <button id="time-swap-btn" class="swap-button"><svg class="menu-item-icon"><use href="src/icons.svg#icon-swap" xlink:href="src/icons.svg#icon-swap"></use></svg></button>
            </div>
            <div class="converter-card">
                <label class="converter-label">To:</label>
                <div class="converter-output-display">
                    <span id="time-output">60.00</span>
                </div>
                <select id="time-to-unit" class="custom-select">
                    <option value="milliseconds">Milliseconds (ms)</option>
                    <option value="seconds">Seconds (s)</option>
                    <option value="minutes" selected>Minutes (min)</option>
                    <option value="hours">Hours (hr)</option>
                    <option value="days">Days</option>
                    <option value="weeks">Weeks</option>
                    <option value="months">Months</option>
                    <option value="years">Years</option>
                    <option value="century">Century</option>
                </select>
            </div>
        </div>
    </div>

    <div id="age-page" class="page-content hidden">
        <div class="page-header">
            <button id="menu-btn-age" class="page-menu-button"><svg class="menu-item-icon"><use href="src/icons.svg#icon-menu" xlink:href="src/icons.svg#icon-menu"></use></svg></button>
            <h1 class="page-title">Age Extractor</h1>
            <div class="spacer"></div>
        </div>
        <div class="converter-section">
            <div class="converter-card">
                <label for="dob-input" class="converter-label">Select Your Date of Birth:</label>
                <input type="date" value="2006-09-30" id="dob-input" class="converter-input" />
            </div>
            <div class="swap-button-container">
                <button id="calc-age-btn" class="swap-button" style="width: fit-content;">Calculate Age</button>
            </div>
            <div class="converter-card">
                <label class="converter-label">Your Age:</label>
                <div id="age-result" class="converter-output-display">--</div>
            </div>
        </div>
    </div>

    <script src="src/app.js"></script>
</body>
